apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: mern
  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: 483176634994.dkr.ecr.us-east-1.amazonaws.com/mern-backend:

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 3000

          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000

          initialDelaySeconds: 40
          periodSeconds: 20